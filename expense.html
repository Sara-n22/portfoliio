<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #83a4d4, #b6fbff);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      width: 400px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    h2 { text-align: center; margin-bottom: 20px; }
    input {
      padding: 10px;
      margin: 5px 0;
      width: calc(100% - 22px);
      border: 1px solid #ccc;
      border-radius: 8px;
    }
    button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      border: none;
      border-radius: 8px;
      background: #2ecc71;
      color: white;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover { background: #27ae60; }
    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }
    li {
      background: #f4f4f4;
      padding: 10px;
      margin: 8px 0;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .delete {
      background: red;
      color: white;
      border: none;
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
    }
    .delete:hover { background: darkred; }
    .summary {
      margin-top: 20px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>💰 Expense Tracker</h2>
    <input type="text" id="desc" placeholder="Expense description">
    <input type="number" id="amount" placeholder="Amount">
    <button onclick="addExpense()">Add Expense</button>

    <ul id="expenseList"></ul>
    <div class="summary">Total: ₹<span id="total">0</span></div>
  </div>

  <script>
    let expenses = JSON.parse(localStorage.getItem("expenses")) || [];

    function renderExpenses() {
      let list = document.getElementById("expenseList");
      list.innerHTML = "";
      let total = 0;

      expenses.forEach((expense, index) => {
        total += expense.amount;
        let li = document.createElement("li");
        li.innerHTML = `
          ${expense.desc} - ₹${expense.amount}
          <button class="delete" onclick="deleteExpense(${index})">X</button>
        `;
        list.appendChild(li);
      });

      document.getElementById("total").textContent = total;
      localStorage.setItem("expenses", JSON.stringify(expenses));
    }

    function addExpense() {
      let desc = document.getElementById("desc").value.trim();
      let amount = parseFloat(document.getElementById("amount").value);

      if (desc === "" || isNaN(amount) || amount <= 0) {
        alert("⚠ Please enter valid description and amount!");
        return;
      }

      expenses.push({ desc, amount });
      document.getElementById("desc").value = "";
      document.getElementById("amount").value = "";
      renderExpenses();
    }

    function deleteExpense(index) {
      expenses.splice(index, 1);
      renderExpenses();
    }

    // Initial render
    renderExpenses();
  </script>
</body>
</html>
